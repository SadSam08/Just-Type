<svg width="100%" viewBox="0 0 680 260" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>JustType logo</title>
  <desc>JustType typing website logo with keyboard key aesthetic</desc>

  <style>
    .logo-text { font-family: 'SF Mono', 'Fira Mono', 'Consolas', monospace; }
    .key-cap { fill: #1a1a2e; rx: 6; }
  </style>

  <!-- Background key caps row (decorative) -->
  <g opacity="0.08">
    <rect x="40" y="30" width="48" height="48" rx="8" fill="#7F77DD"/>
    <rect x="96" y="30" width="48" height="48" rx="8" fill="#7F77DD"/>
    <rect x="152" y="30" width="48" height="48" rx="8" fill="#7F77DD"/>
    <rect x="208" y="30" width="48" height="48" rx="8" fill="#7F77DD"/>
    <rect x="264" y="30" width="48" height="48" rx="8" fill="#7F77DD"/>
    <rect x="320" y="30" width="48" height="48" rx="8" fill="#7F77DD"/>
    <rect x="376" y="30" width="48" height="48" rx="8" fill="#7F77DD"/>
    <rect x="432" y="30" width="48" height="48" rx="8" fill="#7F77DD"/>
    <rect x="488" y="30" width="48" height="48" rx="8" fill="#7F77DD"/>
    <rect x="544" y="30" width="48" height="48" rx="8" fill="#7F77DD"/>
    <rect x="600" y="30" width="48" height="48" rx="8" fill="#7F77DD"/>
  </g>

  <!-- Main icon: stylized "J" key cap -->
  <g transform="translate(246, 82)">
    <rect x="0" y="0" width="72" height="72" rx="10" fill="#2D2B55"/>
    <rect x="5" y="4" width="62" height="62" rx="7" fill="#3A3870"/>
    <text x="36" y="47" text-anchor="middle" font-family="'SF Mono','Fira Mono','Consolas',monospace" font-size="36" font-weight="700" fill="#AFA9EC">J</text>
  </g>

  <!-- Wordmark -->
  <text x="334" y="139" font-family="'SF Mono','Fira Mono','Consolas',monospace" font-size="46" font-weight="700" fill="#2D2B55" text-anchor="start">
    <tspan fill="#2D2B55">Just</tspan><tspan fill="#7F77DD">Type</tspan>
  </text>

  <!-- Blinking cursor -->
  <rect x="562" y="103" width="5" height="42" rx="2" fill="#7F77DD" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0;0.9" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- Tagline -->
  <text x="340" y="175" text-anchor="middle" font-family="'SF Mono','Fira Mono','Consolas',monospace" font-size="13" fill="#888780" letter-spacing="3">type faster. type better.</text>

  <!-- Bottom decorative key row -->
  <g opacity="0.06">
    <rect x="40" y="200" width="48" height="48" rx="8" fill="#534AB7"/>
    <rect x="96" y="200" width="48" height="48" rx="8" fill="#534AB7"/>
    <rect x="152" y="200" width="48" height="48" rx="8" fill="#534AB7"/>
    <rect x="208" y="200" width="48" height="48" rx="8" fill="#534AB7"/>
    <rect x="264" y="200" width="48" height="48" rx="8" fill="#534AB7"/>
    <rect x="320" y="200" width="48" height="48" rx="8" fill="#534AB7"/>
    <rect x="376" y="200" width="48" height="48" rx="8" fill="#534AB7"/>
    <rect x="432" y="200" width="48" height="48" rx="8" fill="#534AB7"/>
    <rect x="488" y="200" width="48" height="48" rx="8" fill="#534AB7"/>
    <rect x="544" y="200" width="48" height="48" rx="8" fill="#534AB7"/>
    <rect x="600" y="200" width="48" height="48" rx="8" fill="#534AB7"/>
  </g>
</svg>
